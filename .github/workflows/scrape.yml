name: Scrape

on:
  schedule:
    # Every 6 hours. Hourly (private repo) burned the free GitHub Actions
    # minute quota, which made every run fail in ~3s once the cap was hit.
    # Availability data changes ~monthly, so 6h is more than fresh enough
    # and uses ~6x fewer minutes.
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'   # cache deps so npm ci is seconds, not ~18s — fewer minutes/run
      - run: npm ci
      - run: npm run migrate
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      - run: npm run scrape
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
      # Send alert emails for status flips / price drops detected above.
      # No-ops safely if RESEND_API_KEY isn't set (subs are still collected).
      - run: npm run notify
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_AUTH_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM: ${{ secrets.ALERT_FROM }}
          SITE_URL: https://isitavailablein.com
      # No CF Pages rebuild hook — site reads Turso live via edge runtime + 5min in-memory cache.
